# GitHub Actions workflow placeholder.
# Copy buyer-module-ci.yml from project artifacts here.
# =============================================================================
# ExpertConnect Marketplace — Buyer Module CI Pipeline
# Version 2.0 — Added Allure Report + JMeter Performance Testing
# =============================================================================
#
# WHAT CHANGED FROM v1.0:
#   ADDED: Allure Report — unified dashboard combining Jest + Newman results
#   ADDED: JMeter — load/performance testing job
#   ADDED: 2 new jobs (allure-report, performance-tests) — total now 9 jobs
#   ADDED: Slack message now includes a clickable Allure report link
#
# WHY ALLURE?
#   Right now you have THREE separate test tools producing THREE separate
#   reports that never talk to each other:
#     Jest unit tests        → plain terminal pass/fail text
#     Jest integration tests → plain terminal pass/fail text + coverage %
#     Newman API tests       → one HTML file (htmlextra), separate from Jest
#
#   A teacher, teammate, or future employer has to open three different
#   places to understand "did everything pass?" Allure solves this by
#   collecting results from ALL THREE tools into ONE dashboard:
#     ├── Total tests across all suites (unit + integration + API)
#     ├── Pass/fail/broken breakdown with full stack traces on failure
#     ├── Test duration trends across multiple pipeline runs (history)
#     ├── Severity tagging (critical/normal/minor) per test
#     └── One single URL to check everything — perfect for a Slack link
#
# WHY JMETER?
#   Every test you have built so far asks "does it work?"
#   JMeter is the first tool that asks "does it work under LOAD?"
#
#   ExpertConnect is a marketplace handling real escrow payments. A bug
#   under load is just as dangerous as a logic bug:
#     ├── 50 buyers hitting GET /api/orders at once — does response time
#     │   stay under 500ms, or does the connection pool exhaust?
#     ├── 20 buyers funding escrow simultaneously — does MySQL handle the
#     │   concurrent writes without deadlocks?
#     ├── A slow query that is invisible with 1 user becomes a 10-second
#     │   wait with 50 concurrent users — JMeter is the only tool that
#     │   reveals this BEFORE real buyers experience it
#
#   JMeter simulates many virtual users hitting your API simultaneously
#   and measures response time, throughput, and error rate under that load.
#
# UPDATED PIPELINE FLOW (visual):
#
#   git push
#       │
#       ▼
#   1. code-quality  →  2. security  →  3. unit-tests  →  4. integration-tests
#                                                                  │
#                                                                  ▼
#                                                          5. api-tests
#                                                            /          \
#                                                           ▼            ▼
#                                          6. performance-tests    7. allure-report
#                                            (JMeter)                (combines 3+4+5
#                                                 \                   results, deploys
#                                                  \                  to GitHub Pages)
#                                                   \                /
#                                                    ▼              ▼
#                                                  8. build-check
#                                                         │
#                                                         ▼
#                                                  9. notify (Slack)
#                                                  includes: pass/fail per job
#                                                            Allure report link
#                                                            JMeter summary
#
# =============================================================================

name: ExpertConnect — Buyer Module CI

on:
  push:
    branches:
      - main
      - feature/shehroz-buyer-module
      - feature/teammate-buyer-module
  pull_request:
    branches:
      - main
  workflow_dispatch:

# =============================================================================
# WORKFLOW-LEVEL PERMISSIONS
# =============================================================================
# By default, GITHUB_TOKEN (auto-generated by GitHub for every pipeline run)
# only has READ access to the repository. The Allure report job needs to
# PUSH the generated HTML report to a branch called "gh-pages" so GitHub
# Pages can serve it as a live website. This permission grants that ability
# WITHOUT needing any extra secret — GITHUB_TOKEN already exists automatically.
# =============================================================================
permissions:
  contents: write

env:
  NODE_VERSION: '20'
  MYSQL_VERSION: '8.0'
  TEST_DB_NAME: expertconnect_test
  COVERAGE_THRESHOLD: '80'

  # ── NEW: JMeter configuration ─────────────────────────────────────────────
  JMETER_VERSION: '5.6.3'
  # Performance thresholds — the pipeline FAILS if these are exceeded
  # These numbers are starting points — tighten them as you learn your
  # system's real capacity (e.g., once you know your DB connection pool
  # limit is 10, you can predict roughly where things should break)
  PERF_MAX_AVG_RESPONSE_MS: '500' # average response time ceiling
  PERF_MAX_ERROR_RATE_PERCENT: '1' # max 1% of requests allowed to fail

jobs:
  # ===========================================================================
  # JOB 1: CODE QUALITY  (unchanged from v1.0)
  # ===========================================================================
  code-quality:
    name: Code Quality — ESLint + Prettier
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Install Node.js v${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install npm dependencies (clean install)
        run: npm ci

      - name: Run ESLint — catch code quality issues
        run: npm run lint

      - name: Run Prettier — verify consistent formatting
        run: npm run format:check

  # ===========================================================================
  # JOB 2: SECURITY SCAN  (unchanged from v1.0)
  # ===========================================================================
  security:
    name: Security — Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Install Node.js v${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Scan dependencies for vulnerabilities
        run: npm audit --audit-level=high

  # ===========================================================================
  # JOB 3: UNIT TESTS — now produces Allure results
  # ===========================================================================
  # WHAT CHANGED: jest.config.js must set testEnvironment to "allure-jest/node"
  # (a package you install: npm install --save-dev allure-jest)
  # This makes Jest automatically write structured result files describing
  # every test — name, duration, pass/fail, error message, stack trace —
  # into an "allure-results" folder as a SIDE EFFECT of running tests
  # normally. You do not change how you write tests at all.
  # ===========================================================================
  unit-tests:
    name: Unit Tests — Jest (no database)
    runs-on: ubuntu-latest
    needs: security

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Install Node.js v${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Run unit test suite
        run: npm run test:unit
        # jest.config.js (testEnvironment: 'allure-jest/node') means this
        # SAME command now also writes allure-results/ automatically.
        # No separate "allure" command needed at this step.
        env:
          JWT_SECRET: test_jwt_secret_not_real
          NODE_ENV: test

      - name: Upload unit test results (raw Jest output)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: test-results/unit/
          retention-days: 14

      # ── NEW: Upload Allure raw results for this job ─────────────────────────
      # This is NOT the final report — it is the raw data (JSON files
      # describing each test). Job 7 (allure-report) downloads this,
      # combines it with integration + API results, and builds ONE
      # combined HTML dashboard out of all three.
      # if: always() — we want Allure data EVEN when tests fail, since
      # seeing failures clearly is the entire point of a test report.
      - name: Upload Allure raw results — unit tests
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-unit
          path: allure-results/
          retention-days: 14

  # ===========================================================================
  # JOB 4: INTEGRATION TESTS — now produces Allure results
  # ===========================================================================
  integration-tests:
    name: Integration Tests — Jest + MySQL
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_DATABASE: expertconnect_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Install Node.js v${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Verify MySQL is accepting connections
        run: |
          until mysqladmin ping -h 127.0.0.1 -P 3306 -u root -p${{ secrets.DB_PASSWORD }} --silent; do
            echo "MySQL not ready yet — waiting 2 seconds..."
            sleep 2
          done

      - name: Import buyer module schema into test database
        run: |
          mysql -h 127.0.0.1 -P 3306 -u root -p${{ secrets.DB_PASSWORD }} \
            expertconnect_test < database/expertconnect_buyer_schema.sql

      - name: Import test seed data
        run: |
          mysql -h 127.0.0.1 -P 3306 -u root -p${{ secrets.DB_PASSWORD }} \
            expertconnect_test < database/test-seed.sql

      - name: Run integration tests with coverage measurement
        run: npm run test:integration:coverage
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: expertconnect_test
          JWT_SECRET: test_jwt_secret_not_real
          NODE_ENV: test

      - name: Upload coverage report as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      # ── NEW: same Allure upload pattern as unit-tests job ──────────────────
      - name: Upload Allure raw results — integration tests
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-integration
          path: allure-results/
          retention-days: 14

  # ===========================================================================
  # JOB 5: API TESTS — Newman now also writes Allure results
  # ===========================================================================
  # WHAT CHANGED: added "allure" to the --reporters list alongside the
  # existing cli and htmlextra reporters. newman-reporter-allure (installed
  # as an npm package) writes the same structured Allure format that Jest
  # does — meaning Job 7 can merge API test results with unit + integration
  # results into ONE dashboard, even though they come from completely
  # different testing tools (Jest vs Newman).
  # ===========================================================================
  api-tests:
    name: API Tests — Newman (Postman Collections)
    runs-on: ubuntu-latest
    needs: integration-tests

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_DATABASE: expertconnect_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Install Node.js v${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      # ── UPDATED: also install the Allure reporter for Newman ───────────────
      - name: Install Newman and reporters (htmlextra + allure)
        run: |
          npm install -g newman
          npm install -g newman-reporter-htmlextra
          npm install -g newman-reporter-allure
          echo "Newman version: $(newman --version)"

      - name: Verify MySQL ready and import schema + seed
        run: |
          until mysqladmin ping -h 127.0.0.1 -P 3306 -u root -p${{ secrets.DB_PASSWORD }} --silent; do
            sleep 2
          done
          mysql -h 127.0.0.1 -P 3306 -u root -p${{ secrets.DB_PASSWORD }} \
            expertconnect_test < database/expertconnect_buyer_schema.sql
          mysql -h 127.0.0.1 -P 3306 -u root -p${{ secrets.DB_PASSWORD }} \
            expertconnect_test < database/test-seed.sql

      - name: Start Next.js server in test mode
        run: npm run start:test &
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: expertconnect_test
          JWT_SECRET: test_jwt_secret_not_real
          NODE_ENV: test
          PORT: 3000

      - name: Wait for Next.js server to be ready
        run: |
          until curl -f http://localhost:3000/health > /dev/null 2>&1; do
            echo "Server not ready — retrying in 2 seconds..."
            sleep 2
          done

      # ── UPDATED: "allure" added to --reporters list ────────────────────────
      # newman-reporter-allure writes to an "allure-results" folder by
      # default (same default folder name Jest's allure-jest uses) —
      # this is intentional, it is the universal format both tools share.
      - name: Run Postman collection via Newman
        run: |
          newman run postman/ExpertConnect-BuyerModule.postman_collection.json \
            --environment postman/test.environment.json \
            --reporters cli,htmlextra,allure \
            --reporter-htmlextra-export newman-report/api-test-results.html \
            --reporter-htmlextra-title "ExpertConnect Buyer Module — API Test Results"

      - name: Upload Newman API test report (htmlextra — standalone HTML)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: newman-api-test-report
          path: newman-report/
          retention-days: 14

      # ── NEW: same Allure upload pattern, this time from Newman's output ────
      - name: Upload Allure raw results — API tests
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-api
          path: allure-results/
          retention-days: 14

  # ===========================================================================
  # JOB 6: PERFORMANCE TESTS — NEW — JMeter Load Testing
  # ===========================================================================
  # WHAT THIS JOB DOES:
  #   Starts your real Next.js server + real MySQL (same setup as api-tests)
  #   then uses Apache JMeter to simulate MANY buyers hitting your API at
  #   the same time, measuring how the system behaves under concurrent load.
  #
  # WHY AFTER api-tests, NOT BEFORE:
  #   There is no point load-testing an API that is functionally broken.
  #   api-tests already proved every endpoint returns the CORRECT response.
  #   This job now asks a different question: does it stay correct and fast
  #   when 50 people hit it at the same moment?
  #
  # WHAT THE JMETER TEST PLAN SIMULATES (performance/buyer-module-load-test.jmx):
  #   Thread Group 1: 50 virtual buyers
  #     ├── Each logs in                      (POST /api/buyers/login)
  #     ├── Each fetches their orders          (GET  /api/orders)
  #     ├── Each fetches one order's detail    (GET  /api/orders/:id)
  #     └── Ramp-up: all 50 join over 10 seconds (not all at once — realistic)
  #
  #   Thread Group 2: 20 virtual buyers
  #     └── Each funds escrow on an order      (POST /api/orders/:id/payment)
  #         (the most database-write-heavy endpoint — most likely to reveal
  #          locking issues or slow transactions under concurrency)
  #
  # WHAT GETS MEASURED:
  #   ├── Average response time (ms)     — typical buyer experience
  #   ├── 95th percentile response time  — worst-case for 95% of buyers
  #   ├── Error rate (%)                 — requests that failed under load
  #   └── Throughput (requests/second)   — how much load the server absorbs
  #
  # WHY THIS JOB CAN FAIL THE PIPELINE:
  #   If average response time exceeds PERF_MAX_AVG_RESPONSE_MS (500ms) or
  #   error rate exceeds PERF_MAX_ERROR_RATE_PERCENT (1%), this job exits
  #   with a failure — exactly like a failing test. A performance regression
  #   is treated with the same seriousness as a broken endpoint.
  # ===========================================================================
  performance-tests:
    name: Performance Tests — JMeter Load Testing
    runs-on: ubuntu-latest
    needs: api-tests

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_DATABASE: expertconnect_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Install Node.js v${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Verify MySQL ready and import schema + seed
        run: |
          until mysqladmin ping -h 127.0.0.1 -P 3306 -u root -p${{ secrets.DB_PASSWORD }} --silent; do
            sleep 2
          done
          mysql -h 127.0.0.1 -P 3306 -u root -p${{ secrets.DB_PASSWORD }} \
            expertconnect_test < database/expertconnect_buyer_schema.sql
          mysql -h 127.0.0.1 -P 3306 -u root -p${{ secrets.DB_PASSWORD }} \
            expertconnect_test < database/test-seed.sql

      - name: Start Next.js server in test mode
        run: npm run start:test &
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: expertconnect_test
          JWT_SECRET: test_jwt_secret_not_real
          NODE_ENV: test
          PORT: 3000

      - name: Wait for Next.js server to be ready
        run: |
          until curl -f http://localhost:3000/health > /dev/null 2>&1; do
            sleep 2
          done

      # ── Step 6.1: Install Apache JMeter ─────────────────────────────────────
      # JMeter is a standalone Java application, not an npm package.
      # We download the official binary distribution directly from the
      # Apache Foundation and add its bin/ folder to PATH so the "jmeter"
      # command becomes available for the rest of this job.
      - name: Install Apache JMeter v${{ env.JMETER_VERSION }}
        run: |
          wget -q https://dlcdn.apache.org/jmeter/binaries/apache-jmeter-${{ env.JMETER_VERSION }}.tgz
          tar -xzf apache-jmeter-${{ env.JMETER_VERSION }}.tgz
          echo "$PWD/apache-jmeter-${{ env.JMETER_VERSION }}/bin" >> $GITHUB_PATH
          echo "JMeter installed"

      # ── Step 6.2: Run the load test ────────────────────────────────────────
      # -n           : run in non-GUI mode (required for CI — no screen exists)
      # -t           : path to the test plan file (the .jmx you design in the
      #                JMeter GUI on your own machine, then commit to the repo)
      # -l           : where to write raw results (one row per request sent)
      # -e -o        : generate the visual HTML dashboard report after the run
      # -Jhost/-Jport: pass your server's address into the test plan as
      #                JMeter "user-defined variables" — keeps the .jmx file
      #                portable instead of hardcoding localhost inside it
      - name: Run JMeter load test against Buyer Module API
        run: |
          mkdir -p performance/results
          jmeter -n \
            -t performance/buyer-module-load-test.jmx \
            -l performance/results/results.jtl \
            -e -o performance/results/html-report \
            -Jhost=localhost \
            -Jport=3000

      # ── Step 6.3: Parse results and enforce performance thresholds ─────────
      # results.jtl is a CSV file — one row per HTTP request JMeter sent.
      # Relevant columns: elapsed (response time in ms), success (true/false)
      #
      # This step is what makes performance testing meaningful in a pipeline:
      # without an automatic pass/fail gate, a human would have to manually
      # open the HTML report every time to notice a regression. This way,
      # a slow query that pushes average response time from 200ms to 800ms
      # FAILS the pipeline automatically, the same way a broken test would.
      - name: Evaluate performance thresholds
        run: |
          AVG_MS=$(awk -F',' 'NR>1 {sum+=$2; count++} END {printf "%.0f", sum/count}' performance/results/results.jtl)
          TOTAL=$(awk -F',' 'NR>1 {count++} END {print count}' performance/results/results.jtl)
          FAILED=$(awk -F',' 'NR>1 && $8=="false" {count++} END {print count+0}' performance/results/results.jtl)
          ERROR_RATE=$(awk -v f="$FAILED" -v t="$TOTAL" 'BEGIN {printf "%.2f", (t>0 ? f/t*100 : 0)}')

          echo "────────────────────────────────────────"
          echo "Average response time : ${AVG_MS} ms   (threshold: ${{ env.PERF_MAX_AVG_RESPONSE_MS }} ms)"
          echo "Error rate             : ${ERROR_RATE} %    (threshold: ${{ env.PERF_MAX_ERROR_RATE_PERCENT }} %)"
          echo "Total requests sent    : ${TOTAL}"
          echo "Failed requests        : ${FAILED}"
          echo "────────────────────────────────────────"

          # Save these numbers so the notify job can show them in Slack
          echo "AVG_RESPONSE_MS=${AVG_MS}"   >> $GITHUB_ENV
          echo "ERROR_RATE_PERCENT=${ERROR_RATE}" >> $GITHUB_ENV

          FAIL_BUILD=0
          if (( AVG_MS > ${{ env.PERF_MAX_AVG_RESPONSE_MS }} )); then
            echo "❌ Average response time exceeds threshold"
            FAIL_BUILD=1
          fi
          if (( $(echo "$ERROR_RATE > ${{ env.PERF_MAX_ERROR_RATE_PERCENT }}" | bc -l) )); then
            echo "❌ Error rate exceeds threshold"
            FAIL_BUILD=1
          fi
          if [ "$FAIL_BUILD" -eq 1 ]; then
            echo "Performance thresholds were not met — failing this job"
            exit 1
          fi
          echo "✅ All performance thresholds met"

      # ── Step 6.4: Upload the JMeter HTML dashboard ──────────────────────────
      # if: always() — we want this report even when the thresholds above
      # fail, since the report is exactly what explains WHY it failed
      # (which specific endpoint was slow, response time distribution graph,
      # error breakdown per request type)
      - name: Upload JMeter performance report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jmeter-performance-report
          path: performance/results/html-report/
          retention-days: 14

  # ===========================================================================
  # JOB 7: ALLURE REPORT — NEW — Unified Test Dashboard
  # ===========================================================================
  # WHAT THIS JOB DOES:
  #   Downloads the THREE separate allure-results artifacts produced by
  #   unit-tests, integration-tests, and api-tests, merges them into one
  #   folder, then generates a SINGLE interactive HTML report covering
  #   every test from every tool — Jest AND Newman together.
  #
  #   It then publishes that HTML report to GitHub Pages, which gives you
  #   a permanent, shareable URL (not just a downloadable zip file like a
  #   normal artifact). This URL is what gets posted in Slack.
  #
  # if: always() — THIS IS DELIBERATE
  #   Most jobs in this pipeline stop the chain when something fails.
  #   This job is the opposite — it MUST run even when tests failed,
  #   because a report showing "everything failed, here is exactly why"
  #   is more valuable than a report that only appears when things pass.
  #
  # HISTORY / TREND GRAPHS:
  #   The "Retrieve previous report history" step checks out the existing
  #   gh-pages branch (if one exists from a previous run) before generating
  #   the new report. This lets Allure show a TREND graph — "tests passed
  #   in the last 20 runs" — instead of only showing the current run in
  #   isolation. This is one of Allure's most valuable features for a team:
  #   you can see if a flaky test fails intermittently over time.
  #
  # GITHUB PAGES REQUIREMENT (one-time setup):
  #   GitHub repo → Settings → Pages → Source: "Deploy from a branch"
  #   Branch: gh-pages, folder: / (root)
  #   This only needs to be set once. After the first successful run of
  #   this job, the gh-pages branch will exist automatically.
  #
  #   NOTE FOR PRIVATE REPOS: GitHub Pages on private repositories requires
  #   a paid GitHub plan (Team/Enterprise) to be publicly viewable. On the
  #   free plan with a private repo, the report still gets pushed to the
  #   gh-pages branch successfully — you just access it by downloading the
  #   "allure-history" content from that branch directly, rather than via
  #   a public URL. If your repo is public, the URL works immediately.
  # ===========================================================================
  allure-report:
    name: Allure Report — Unified Test Dashboard
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, api-tests]
    if: always()

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      # ── Step 7.1: Download each tool's raw results into one folder ─────────
      # All three downloads target the SAME local folder ("allure-results")
      # because Allure's report generator reads every file in that one
      # folder regardless of which tool originally produced it — this is
      # the entire point of using a shared, tool-agnostic results format.
      - name: Download unit test Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-unit
          path: allure-results

      - name: Download integration test Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-integration
          path: allure-results

      - name: Download API test Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-api
          path: allure-results

      # ── Step 7.2: Retrieve previous report (enables trend history) ─────────
      # continue-on-error: true — if gh-pages branch does not exist yet
      # (this is the very FIRST pipeline run ever), this step fails
      # harmlessly and an empty history is used instead. From the second
      # run onward, this always succeeds and history accumulates.
      - name: Retrieve previous Allure report history
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages-history

      # ── Step 7.3: Generate the combined HTML report ─────────────────────────
      # simple-elf/allure-report-action is a pre-built community action that
      # wraps the official "allure generate" command plus the history-merging
      # logic described above, so we do not have to script it manually.
      # keep_reports: 20 means only the last 20 runs' history is retained —
      # prevents the gh-pages branch from growing forever.
      - name: Generate Allure HTML report (with history)
        uses: simple-elf/allure-report-action@v1.7
        if: always()
        with:
          allure_results: allure-results
          allure_history: allure-history
          keep_reports: 20

      # ── Step 7.4: Publish the report to GitHub Pages ────────────────────────
      # peaceiris/actions-gh-pages pushes the generated "allure-history"
      # folder to a branch called "gh-pages". GitHub Pages then serves
      # whatever is on that branch as a live website automatically —
      # no separate hosting service needed, it is built into GitHub.
      - name: Deploy Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history

      # ── Step 7.5: Build the predictable Pages URL ───────────────────────────
      # GitHub Pages URLs for project sites always follow this exact pattern:
      # https://<account-username>.github.io/<repository-name>/
      # We construct it here rather than guessing, so the notify job (Job 9)
      # can post a working clickable link straight into Slack.
      - name: Compute Allure report URL
        id: report-url
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          echo "url=https://${GITHUB_REPOSITORY_OWNER}.github.io/${REPO_NAME}/" >> $GITHUB_OUTPUT

    outputs:
      report_url: ${{ steps.report-url.outputs.url }}

  # ===========================================================================
  # JOB 8: BUILD CHECK  (unchanged from v1.0)
  # ===========================================================================
  build-check:
    name: Build Check — Next.js Compilation
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, api-tests]

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Install Node.js v${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Compile Next.js application
        run: npm run build
        env:
          DB_HOST: localhost
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: expertconnect_test
          JWT_SECRET: test_jwt_secret_not_real
          NEXT_PUBLIC_API_URL: http://localhost:3000

      - name: Save build output as artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: nextjs-build-output
          path: .next/
          retention-days: 3

  # ===========================================================================
  # JOB 9: NOTIFY — UPDATED — now includes Allure link + Performance summary
  # ===========================================================================
  notify:
    name: Notify — Slack Pipeline Results
    runs-on: ubuntu-latest

    # ── UPDATED: added allure-report and performance-tests to needs ─────────
    needs:
      - code-quality
      - security
      - unit-tests
      - integration-tests
      - api-tests
      - performance-tests
      - allure-report
      - build-check

    if: always()

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      # ── UPDATED: performance-tests added to the all-green calculation ──────
      # allure-report is intentionally NOT part of this check — it is a
      # reporting job, not a quality gate. It should always show results
      # even on a failing run, so its own pass/fail does not change whether
      # we consider the overall pipeline "successful."
      - name: Calculate overall pipeline status
        id: pipeline-status
        run: |
          if [[ \
            "${{ needs.code-quality.result }}"      == "success" && \
            "${{ needs.security.result }}"           == "success" && \
            "${{ needs.unit-tests.result }}"         == "success" && \
            "${{ needs.integration-tests.result }}"  == "success" && \
            "${{ needs.api-tests.result }}"          == "success" && \
            "${{ needs.performance-tests.result }}"  == "success" && \
            "${{ needs.build-check.result }}"        == "success" \
          ]]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "emoji=✅"       >> $GITHUB_OUTPUT
            echo "color=good"     >> $GITHUB_OUTPUT
            echo "message=All checks passed — ready to merge" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "emoji=❌"       >> $GITHUB_OUTPUT
            echo "color=danger"   >> $GITHUB_OUTPUT
            echo "message=Pipeline failed — review required before merge" >> $GITHUB_OUTPUT
          fi

      # ── UPDATED Slack payload ────────────────────────────────────────────
      # New additions vs v1.0:
      #   1. Performance Tests row in the status grid
      #   2. A dedicated section with the clickable Allure report link
      - name: Send Slack notification
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              "attachments": [
                {
                  "color": "${{ steps.pipeline-status.outputs.color }}",
                  "blocks": [
                    {
                      "type": "header",
                      "text": {
                        "type": "plain_text",
                        "text": "${{ steps.pipeline-status.outputs.emoji }} ExpertConnect — Buyer Module CI"
                      }
                    },
                    {
                      "type": "section",
                      "fields": [
                        {
                          "type": "mrkdwn",
                          "text": "*Developer:*\n${{ github.actor }}"
                        },
                        {
                          "type": "mrkdwn",
                          "text": "*Branch:*\n`${{ github.ref_name }}`"
                        },
                        {
                          "type": "mrkdwn",
                          "text": "*Commit:*\n${{ github.event.head_commit.message }}"
                        },
                        {
                          "type": "mrkdwn",
                          "text": "*Result:*\n${{ steps.pipeline-status.outputs.message }}"
                        }
                      ]
                    },
                    {
                      "type": "section",
                      "fields": [
                        {
                          "type": "mrkdwn",
                          "text": "*Code Quality:* ${{ needs.code-quality.result == 'success' && '✅' || '❌' }}"
                        },
                        {
                          "type": "mrkdwn",
                          "text": "*Security:* ${{ needs.security.result == 'success' && '✅' || '❌' }}"
                        },
                        {
                          "type": "mrkdwn",
                          "text": "*Unit Tests:* ${{ needs.unit-tests.result == 'success' && '✅' || '❌' }}"
                        },
                        {
                          "type": "mrkdwn",
                          "text": "*Integration Tests:* ${{ needs.integration-tests.result == 'success' && '✅' || '❌' }}"
                        },
                        {
                          "type": "mrkdwn",
                          "text": "*API Tests:* ${{ needs.api-tests.result == 'success' && '✅' || '❌' }}"
                        },
                        {
                          "type": "mrkdwn",
                          "text": "*Performance Tests:* ${{ needs.performance-tests.result == 'success' && '✅' || '❌' }}"
                        },
                        {
                          "type": "mrkdwn",
                          "text": "*Build Check:* ${{ needs.build-check.result == 'success' && '✅' || '❌' }}"
                        }
                      ]
                    },
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "📊 *Allure Report:* <${{ needs.allure-report.outputs.report_url }}|View unified test dashboard ↗>\n_Combines unit, integration, and API test results in one place, with pass/fail history across runs._"
                      }
                    },
                    {
                      "type": "actions",
                      "elements": [
                        {
                          "type": "button",
                          "text": {
                            "type": "plain_text",
                            "text": "View Pipeline Run"
                          },
                          "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                        }
                      ]
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

# =============================================================================
# GITHUB SECRETS REQUIRED  (unchanged — no new secrets needed)
# =============================================================================
# Secret Name          Value
# ──────────────────── ──────────────────────────────────────────────────────
# DB_PASSWORD          Your chosen MySQL root password for test database
# JWT_SECRET           A random string for JWT signing in tests
# SLACK_WEBHOOK_URL    From Slack: Apps → Incoming Webhooks → Webhook URL
#
# GITHUB_TOKEN used by the Allure deploy step is created AUTOMATICALLY by
# GitHub Actions for every run — you never create or store this yourself.
#
# =============================================================================
# NEW FILES REQUIRED FOR THIS VERSION
# =============================================================================
# File                                           Used by          Notes
# ──────────────────────────────────────────────  ───────────────  ───────────────────────────
# performance/buyer-module-load-test.jmx          performance-tests  Built in JMeter's GUI on
#                                                                     your own machine, then
#                                                                     committed to the repo.
#                                                                     Defines the virtual user
#                                                                     scenarios described above.
#
# package.json devDependencies to add:
#   "allure-jest"              → makes Jest write allure-results automatically
#   (newman-reporter-allure is installed globally in the pipeline itself,
#    no package.json change needed for that one)
#
# jest.config.js change needed:
#   testEnvironment: 'allure-jest/node'
#   testEnvironmentOptions: { resultsDir: 'allure-results' }
#
# ONE-TIME REPO SETTING:
#   GitHub repo → Settings → Pages → Source: Deploy from branch "gh-pages"
#   (the gh-pages branch is created automatically the first time this
#    pipeline runs successfully — you only set the Pages source once,
#    after that first run)
#
# =============================================================================
# UPDATED TOTAL PIPELINE TIME ESTIMATE
# =============================================================================
# Job                     Time        Notes
# ───────────────────────  ───────────  ─────────────────────────────────────
# 1. code-quality          ~2 min
# 2. security               ~1 min
# 3. unit-tests              ~3 min      now also writes allure-results
# 4. integration-tests       ~5 min      now also writes allure-results
# 5. api-tests                ~4 min      now also writes allure-results
# 6. performance-tests         ~5 min      NEW — JMeter install + load run
# 7. allure-report               ~2 min      NEW — runs parallel to 6 and 8
# 8. build-check                   ~3 min      runs parallel to 6 and 7
# 9. notify                          instant
# ───────────────────────  ───────────  ─────────────────────────────────────
# Total (longest path):    ~25 minutes per push  (was ~18 min in v1.0)
# =============================================================================
